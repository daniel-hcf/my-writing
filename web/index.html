<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>写作练习</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">写作练习</div>
    <nav class="tabs" id="tabs">
      <button data-tab="daily" class="tab active">每日一练</button>
      <button data-tab="image_practice" class="tab">看图写作</button>
      <button data-tab="journal" class="tab">每日随笔</button>
      <button data-tab="history" class="tab">历史</button>
      <button data-tab="stats" class="tab">统计</button>
      <button data-tab="settings" class="tab">设置</button>
    </nav>
    <button id="logout-btn" class="btn btn-sm logout-btn">退出</button>
  </header>

  <main id="view"></main>

  <div id="toast" class="toast"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
